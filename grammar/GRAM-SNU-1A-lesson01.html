<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>GRAM · SNU · 1A · lesson01 · Grammar</title>

  <style>
    :root{
      --bg:#f0f4f8; --card:#ffffff; --primary:#2d6cdf; --primary2:#1f4ea5;
      --text:#223047; --muted:#6a7a8e; --line:#d9e4f5;
      --warnbg:#fff5f5; --warnline:#feb2b2; --warntext:#7a1f1f;
      --ok:#0f7a3d; --bad:#c0392b; --orange:#e67e22;
    }
    *{box-sizing:border-box}
    body{margin:0; padding:20px; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); text-align:center;}
    .container{max-width:560px; margin:0 auto; background:var(--card); padding:26px; border-radius:20px; border:1px solid var(--line); box-shadow:0 10px 20px rgba(0,0,0,0.08);}
    h1{margin:0; font-size:22px; color:#1f2f45;}
    .topline{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap;}
    .badge{display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid #d7dee7; background:#f6f9ff; font-size:12px; font-weight:900; color:#2c3e50;}
    .nameBox{font-size:14px; color:#4b5b6f; text-align:left;}
    .nameBox b{color:#1f2f45;}
    .btn{width:100%; background:var(--primary); color:#fff; padding:14px 12px; border:none; border-radius:12px; cursor:pointer; font-size:16px; font-weight:900; transition:.2s;}
    .btn:hover{background:var(--primary2);}
    .btnGray{background:#eef2f7; color:#223047; border:1px solid #d7dee7;}
    .btnGray:hover{background:#e2e8f0;}
    .btnRow{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}
    .btnRow .btn{flex:1}
    .qno{margin-top:14px; color:var(--primary); font-weight:900; font-size:15px;}
    .inst{margin-top:10px; background:#eef2f7; border:1px solid #d7dee7; padding:10px; border-radius:10px; color:#223047; font-size:14px; line-height:1.35;}
    .question{margin:18px 0 10px; font-size:22px; font-weight:900; color:#1f2f45; line-height:1.35; word-break:keep-all; white-space:pre-line;}
    .choice{width:100%; margin:10px 0; padding:14px 12px; border-radius:12px; border:2px solid var(--primary); background:#fff; color:#223047; font-size:16px; font-weight:900; cursor:pointer; transition:.15s; text-align:left; -webkit-tap-highlight-color:transparent;}
    .choice:hover{background:var(--primary); color:#fff;}
    .hidden{display:none;}
    .warn{margin-top:14px; background:var(--warnbg); border:1px solid var(--warnline); border-radius:12px; padding:12px; color:var(--warntext); font-size:14px; line-height:1.45; text-align:left;}
    .info{margin-top:14px; background:#f6f9ff; border:1px solid #cfe0ff; border-radius:12px; padding:12px; color:#1f2f45; font-size:14px; line-height:1.45; text-align:left;}
    .panel{margin-top:16px; padding:14px; border:1px solid var(--line); border-radius:14px; background:#fff; text-align:left;}
    .score{font-size:26px; font-weight:900; color:var(--bad); margin:10px 0;}
    .wrongList{max-height:300px; overflow:auto; padding:12px; border-radius:12px; border:1px solid var(--warnline); background:var(--warnbg);}
    .wrongItem{padding:8px 0; border-bottom:1px dashed var(--warnline); font-size:15px; white-space:pre-line;}
    .wrongItem:last-child{border-bottom:none;}
    .note{margin-top:10px; color:var(--muted); font-size:13px; line-height:1.45;}
    .resultCard{border:2px solid #cfe0ff; background:#f6f9ff; border-radius:14px; padding:14px; margin-top:14px; text-align:left;}
    .resultCard p{margin:8px 0; font-size:15px; line-height:1.55;}
    .bigMsg{font-size:18px; font-weight:900;}
    .center{text-align:center;}
    @media(max-width:520px){
      body{padding:14px}
      .container{padding:14px}
      .btn{padding:12px 10px; font-size:15px}
      .question{font-size:20px}
      .choice{font-size:15px}
    }
  </style>
</head>

<body>
<div class="container">
  <div class="topline">
    <div class="nameBox">
      <div><span class="badge">GRAM · SNU · 1A · lesson01</span></div>
      <div style="margin-top:6px;">Нэр: <b id="studentName">—</b></div>
      <div>Анги: <b id="klassName">—</b></div>
    </div>
    <button class="btn btnGray" onclick="goBack()">Буцах</button>
  </div>

  <div id="noticeSection" class="info hidden"></div>
  <div id="errorSection" class="warn hidden"></div>

  <div id="quizSection" class="hidden">
    <div class="qno" id="qno"></div>
    <div class="inst" id="inst"></div>
    <div class="question" id="qtext"></div>
    <div id="choices"></div>
    <div class="note">Санамж: Дуусмагц эхлээд Review (алдаа) дэлгэц гарна, дараа нь Results дэлгэц гарна.</div>
  </div>

  <div id="reviewSection" class="hidden">
    <h1 style="color:var(--orange);">Review · Алдаагаа шалгана уу</h1>
    <p class="note">Эхлээд зөв хариуг хараад, дараа нь Results руу орно.</p>

    <div class="panel">
      <div class="score" id="reviewScore"></div>
      <div class="wrongList" id="wrongList"></div>
      <div class="note" id="attemptInfo"></div>

      <div class="btnRow">
        <button class="btn" style="background:var(--ok);" onclick="goResult()">Results (Дүн)</button>
        <button class="btn" style="background:var(--orange);" onclick="retry()">Дахин оролдох</button>
        <button class="btn btnGray" onclick="goBack()">Буцах</button>
      </div>
    </div>
  </div>

  <div id="resultSection" class="hidden">
    <h1 id="resultTitle" style="color:var(--ok);">Тэнцлээ!</h1>

    <div class="resultCard">
      <p class="bigMsg" id="resultLine1"></p>
      <p class="center"><span class="score" id="finalScore"></span></p>
      <p id="resultLine2"></p>
      <p id="resultDate"></p>
      <p style="margin-top:12px; font-weight:900; color:#1f2f45;">Есүс танд хайртай!</p>
      <p class="note" id="logStatus"></p>
    </div>

    <div class="btnRow">
      <button class="btn btnGray" onclick="goBack()">Буцах</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBe6Y0W3IJKjWV8MLFnR5b9OMePDPHGVACPekJQpvLWRrlayRmHBJCezamKqN9rZg6/exec";
const lessonId = "GRAM-SNU-1A-lesson01";

const rawQ = [
  { q:"[1/25] N은/는 N이에요/예요\n(Танилцуулга: өдөр тутмын, энгийн)\n어떤 상황에서 써요?", a:"일상적·비격식", c:["발표/공식", "명령", "과거"] },
  { q:"[2/25] ‘은/는’은 무엇을 표시해요?\n(Сэдэв/сэдвийг ялгана)", a:"주제(Topic)", c:["목적어", "장소", "시간"] },
  { q:"[3/25] 받침 O → ‘은/는’는?\n(Дагавар авиатай бол)", a:"N+은", c:["N+는", "N+이", "N+가"] },
  { q:"[4/25] 받침 X → ‘은/는’는?\n(Дагавар авиа байхгүй бол)", a:"N+는", c:["N+은", "N+이에요", "N+입니다"] },
  { q:"[5/25] ‘이에요/예요’는 무엇이에요?\n(…이다)", a:"서술격 조사", c:["과거", "부정", "의문"] },
  { q:"[6/25] 받침 O → ‘이에요/예요’는?", a:"N+이에요", c:["N+예요", "N+입니다", "N+입니까"] },
  { q:"[7/25] 받침 X → ‘이에요/예요’는?", a:"N+예요", c:["N+이에요", "N+이 아닙니다", "N+가 아닙니다"] },
  { q:"[8/25] 예문: 저는 유진이에요. (맞아요/틀려요)", a:"맞아요", c:["틀려요", "부정이에요", "의문이에요"] },
  { q:"[9/25] 저는 중국 사람이에요. 학생이에요.\n(Ярианы хэл)", a:"비격식", c:["격식", "명령", "과거"] },
  { q:"[10/25] N입니까?/N입니다는 언제 써요?\n(Албан ёсны)", a:"격식/공식", c:["친구끼리", "메모", "감탄"] },
  { q:"[11/25] 평서문(대답): ‘저는 마이클___’", a:"입니다", c:["입니까", "예요", "이에요"] },
  { q:"[12/25] 의문문(질문): ‘마이클 씨는 미국 사람___?’", a:"입니까", c:["입니다", "예요", "이에요"] },
  { q:"[13/25] ‘입니다’는 ‘이에요/예요’보다?", a:"더 격식적", c:["더 비격식", "과거형", "부정형"] },
  { q:"[14/25] ‘입니까?’는 어떤 문장?", a:"의문문", c:["평서문", "명령문", "청유문"] },
  { q:"[15/25] ‘영국 사람입니다.’ 문장 종류는?", a:"대답/서술", c:["질문", "요청", "감탄"] },
  { q:"[16/25] ‘N이/가 아닙니다’는? (…아니다)", a:"격식체 부정", c:["과거", "요청", "비격식 소개"] },
  { q:"[17/25] 받침 O → ‘사람___ 아닙니다’", a:"이", c:["가", "은", "는"] },
  { q:"[18/25] 받침 X → ‘가수___ 아닙니다’", a:"가", c:["이", "은", "는"] },
  { q:"[19/25] A: 미국 사람입니까? B: 미국 사람이 아닙니다.\nB 문법은?", a:"N이/가 아닙니다", c:["N이에요/예요", "N입니까?", "N입니다"] },
  { q:"[20/25] ‘아닙니다’는 어느 스타일?", a:"격식", c:["비격식", "반말", "과거"] },
  { q:"[21/25] (Mini) ‘저___ 학생이에요.’", a:"는", c:["은", "이", "가"] },
  { q:"[22/25] (Mini) ‘학생___.’ 받침 O + 비격식", a:"이에요", c:["예요", "입니다", "입니까"] },
  { q:"[23/25] (Mini) ‘마이클 씨는 미국 사람___?’ 격식 질문", a:"입니까", c:["입니다", "예요", "아닙니다"] },
  { q:"[24/25] (Mini) ‘저는 미국 사람___.’ 격식 부정", a:"이 아닙니다", c:["가 아닙니다", "예요", "입니까"] },
  { q:"[25/25] (Mini) ‘나나는 가수___ 아닙니다.’ 받침 X", a:"가", c:["이", "은", "는"] }
];

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}
function jsonp(url, timeoutMs=9000){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Date.now()+"_"+Math.floor(Math.random()*10000);
    let done=false;
    const timer=setTimeout(()=>{
      if(done) return;
      done=true;
      try{ script.remove(); }catch(e){}
      try{ delete window[cb]; }catch(e){}
      reject(new Error("jsonp_timeout"));
    }, timeoutMs);

    window[cb]=(data)=>{
      if(done) return;
      done=true;
      clearTimeout(timer);
      try{ script.remove(); }catch(e){}
      try{ delete window[cb]; }catch(e){}
      resolve(data);
    };
    const script=document.createElement("script");
    script.src=url+(url.includes("?")?"&":"?")+"callback="+cb;
    script.onerror=()=>{
      if(done) return;
      done=true;
      clearTimeout(timer);
      try{ script.remove(); }catch(e){}
      try{ delete window[cb]; }catch(e){}
      reject(new Error("jsonp_error"));
    };
    document.body.appendChild(script);
  });
}
function getDeviceId(){
  const k="kquiz_deviceId";
  let id=localStorage.getItem(k);
  if(!id){
    id=(crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now()+"_"+Math.random()).replace(".","");
    localStorage.setItem(k,id);
  }
  return id;
}

let name="", klass="", token="", deviceId="";
let attempts=0;
let questions=[], idx=0, score=0, wrong=[];
let lastFinalScore=0;

const studentNameEl = document.getElementById("studentName");
const klassNameEl = document.getElementById("klassName");
const noticeSection = document.getElementById("noticeSection");
const errorSection = document.getElementById("errorSection");
const quizSection = document.getElementById("quizSection");
const reviewSection = document.getElementById("reviewSection");
const resultSection = document.getElementById("resultSection");
const qnoEl = document.getElementById("qno");
const instEl = document.getElementById("inst");
const qtextEl = document.getElementById("qtext");
const choicesEl = document.getElementById("choices");
const reviewScoreEl = document.getElementById("reviewScore");
const wrongListEl = document.getElementById("wrongList");
const attemptInfoEl = document.getElementById("attemptInfo");
const resultTitleEl = document.getElementById("resultTitle");
const resultLine1El = document.getElementById("resultLine1");
const finalScoreEl = document.getElementById("finalScore");
const resultLine2El = document.getElementById("resultLine2");
const resultDateEl = document.getElementById("resultDate");
const logStatusEl = document.getElementById("logStatus");

function showNotice(msg){
  noticeSection.textContent = msg;
  noticeSection.classList.remove("hidden");
}
function hideNotice(){
  noticeSection.classList.add("hidden");
}
function showError(msg){
  errorSection.textContent = msg;
  errorSection.classList.remove("hidden");
  quizSection.classList.add("hidden");
  reviewSection.classList.add("hidden");
  resultSection.classList.add("hidden");
}
function showQuiz(){
  errorSection.classList.add("hidden");
  reviewSection.classList.add("hidden");
  resultSection.classList.add("hidden");
  quizSection.classList.remove("hidden");
  showQuestion();
}

function getParams(){
  const p = new URLSearchParams(location.search);
  return {
    name:(p.get("name")||"").trim(),
    klass:(p.get("klass")||"").trim(),
    token:(p.get("token")||"").trim(),
    lang:(p.get("lang")||"").trim()
  };
}

async function validateToken(){
  const url = `${SCRIPT_URL}?action=validate&token=${encodeURIComponent(token)}&deviceId=${encodeURIComponent(deviceId)}&klass=${encodeURIComponent(klass)}&name=${encodeURIComponent(name)}`;
  const res = await jsonp(url);
  return !!(res && res.ok);
}

function loadAttempts(){
  const k = `attempts_${lessonId}_${name}`;
  attempts = parseInt(localStorage.getItem(k)||"0",10) || 0;
}
function saveAttempts(){
  const k = `attempts_${lessonId}_${name}`;
  localStorage.setItem(k, String(attempts));
}
function clearAttempts(){
  const k = `attempts_${lessonId}_${name}`;
  localStorage.removeItem(k);
}

function prepareQuestions(){
  questions = shuffle(rawQ).map(item=>{
    const choices = shuffle([item.a, ...item.c]).slice(0,4);
    return { q:item.q, a:item.a, choices };
  });
  idx=0; score=0; wrong=[];
}
function showQuestion(){
  if(idx>=questions.length){ finish(); return; }
  const item = questions[idx];
  qnoEl.textContent = `${idx+1} / ${questions.length}`;
  instEl.textContent = "Зөв хариуг сонгоно уу.";
  qtextEl.textContent = item.q;
  choicesEl.innerHTML="";
  item.choices.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.textContent=c;
    btn.onclick=()=>answer(c);
    choicesEl.appendChild(btn);
  });
}
function answer(choice){
  const item=questions[idx];
  if(choice===item.a){ score += (100/questions.length); }
  else{ wrong.push(item); }
  idx++;
  showQuestion();
}

async function finish(){
  attempts++;
  saveAttempts();
  const finalScore=Math.round(score);
  lastFinalScore = finalScore;

  logStatusEl.textContent = "Бүртгэл илгээж байна...";
  await sendLog(finalScore);

  // Always review first
  showReview(finalScore);
}

function showReview(finalScore){
  quizSection.classList.add("hidden");
  resultSection.classList.add("hidden");
  reviewSection.classList.remove("hidden");

  const color = finalScore>=80 ? "var(--ok)" : "var(--bad)";
  reviewScoreEl.innerHTML = `Таны дүн: <b style="color:${color};">${finalScore} оноо</b>`;
  attemptInfoEl.textContent = `Оролдлого: ${attempts}`;

  wrongListEl.innerHTML="";
  if(!wrong.length){
    const div=document.createElement("div");
    div.className="wrongItem";
    div.textContent = "🎉 Бүх асуулт зөв байна!";
    wrongListEl.appendChild(div);
  }else{
    wrong.forEach(w=>{
      const div=document.createElement("div");
      div.className="wrongItem";
      div.innerHTML = `❓ <b>${escapeHtml(w.q)}</b>\n✅ <b>${escapeHtml(w.a)}</b>`;
      wrongListEl.appendChild(div);
    });
  }
}

async function sendLog(finalScore){
  try{
    const ua = navigator.userAgent || "";
    const url =
      `${SCRIPT_URL}?action=log` +
      `&token=${encodeURIComponent(token)}` +
      `&deviceId=${encodeURIComponent(deviceId)}` +
      `&book=${encodeURIComponent("GRAMMAR")}` +
      `&lesson=${encodeURIComponent(lessonId)}` +
      `&score=${encodeURIComponent(String(finalScore))}` +
      `&attempts=${encodeURIComponent(String(attempts))}` +
      `&ua=${encodeURIComponent(ua)}`;
    const res = await jsonp(url);
    if(res && res.ok){
      logStatusEl.textContent = "Бүртгэл амжилттай илгээгдлээ.";
    }else{
      logStatusEl.textContent = "Бүртгэл илгээхэд алдаа гарлаа. (Сургалт үргэлжилнэ)";
    }
  }catch(e){
    logStatusEl.textContent = "Бүртгэл илгээхэд алдаа гарлаа. (Сургалт үргэлжилнэ)";
  }
}

async function showResult(finalScore){
  quizSection.classList.add("hidden");
  reviewSection.classList.add("hidden");
  resultSection.classList.remove("hidden");

  const pass = finalScore>=80;
  resultTitleEl.textContent = pass ? "Тэнцлээ!" : "Дахин оролдоорой";
  resultTitleEl.style.color = pass ? "var(--ok)" : "var(--bad)";

  resultLine1El.textContent = pass ? `${name} · Тэнцлээ!` : `${name} · Хичээгээрэй!`;
  finalScoreEl.textContent = `Дүн: ${finalScore} оноо`;
  resultLine2El.textContent = `Анги: ${klass} · Оролдлого: ${attempts}`;

  const now = new Date();
  const fmt = new Intl.DateTimeFormat("mn-MN", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" });
  resultDateEl.textContent = `Огноо: ${fmt.format(now)}`;

  clearAttempts();
}

function retry(){ prepareQuestions(); showQuiz(); }
function goResult(){ showResult(lastFinalScore); }

function goBack(){
  const u = new URL(location.href);
  const nameQ = u.searchParams.get("name") || "";
  const klassQ = u.searchParams.get("klass") || "";
  const tokenQ = u.searchParams.get("token") || "";
  const langQ = u.searchParams.get("lang") || "";
  const qs =
    `?name=${encodeURIComponent(nameQ)}` +
    `&klass=${encodeURIComponent(klassQ)}` +
    (tokenQ ? `&token=${encodeURIComponent(tokenQ)}` : "") +
    (langQ ? `&lang=${encodeURIComponent(langQ)}` : "");
  location.href = "GRAM-SNU-1A-hub.html" + qs;
}

(async function init(){
  const p=getParams();
  name=p.name; klass=p.klass; token=p.token;
  deviceId=getDeviceId();

  studentNameEl.textContent = name || "—";
  klassNameEl.textContent = klass || "—";

  if(!name || !klass){
    showError("Нэвтрэх мэдээлэл дутуу байна. Эхлэл хуудас руу буцаад дахин нэвтэрнэ үү.");
    return;
  }

  // token이 없어도 학습은 진행(로그는 best-effort)
  if(!token){
    token = "no_token_" + deviceId;
    showNotice("Санамж: Token байхгүй байна. Сургалт үргэлжилнэ. (Бүртгэл хэсэгчлэн алдагдаж магадгүй)");
  }

  // Validate는 시도하되, 실패해도 막지 않음 (현장에서 끊김 방지)
  try{
    const ok = await validateToken();
    if(!ok){
      showNotice("Санамж: Энэ холбоосын token баталгаажаагүй. Гэхдээ сургалт үргэлжилнэ.");
    }
  }catch(e){
    showNotice("Санамж: Сервертэй холбогдож чадсангүй. Гэхдээ сургалт үргэлжилнэ.");
  }

  loadAttempts();
  prepareQuestions();
  showQuiz();
})();
</script>
</body>
</html>
